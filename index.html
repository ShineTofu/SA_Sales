<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Tracker</title>
<style>
  body { font-family: Arial; margin: 20px; }
  label { display: block; margin-top: 10px; }
  input, select { width: 200px; padding: 5px; }
  table { border-collapse: collapse; margin-top: 20px; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
  button { margin-top: 10px; }
</style>
</head>

<body>

<h2>General Information</h2>

<label>Date</label>
<input type="date" id="date">

<label>District</label>
<input type="text" id="district">

<label>Sales Channel</label>
<select id="channel">
  <option value="">Select</option>
  <option>Market sales</option>
  <option>Door to door</option>
  <option>Retail</option>
</select>

<!-- Market name -->
<label id="marketLabel" style="display:none">Market Name</label>
<select id="marketName" style="display:none">
  <option value="">Select</option>
  <option>Buseruka</option>
  <option>Butimba</option>
  <option>Kyakapeya</option>
  <option>Kisalizi</option>
  <option>Wegesa / Bugambe</option>
  <option>Kigorobya</option>
  <option>Katikala</option>
  <option>Parkcell</option>
  <option>Ruguse</option>
  <option>Kabale</option>
  <option>Dwoli</option>
  <option>Kinogozi</option>
  <option>Buhimba</option>
  <option>Kijangi</option>
  <option>Parkcell / CBD</option>
  <option>Karongo</option>
  <option>Butema</option>
  <option>Rwentale</option>
</select>

<label>Product</label>
<input type="text" id="product">

<label>SA</label>
<input type="text" id="sa">

<label>Unit Price</label>
<input type="number" id="price">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Stock Issued (Portions)</label>
<input type="number" id="issuedPortions">

<label>Closing Balance (Portions)</label>
<input type="number" id="closingPortions">

<button onclick="recordData()">Record</button>

<h2>Records</h2>

<table id="recordsTable">
<thead>
<tr>
<th>Date</th>
<th>District</th>
<th>Channel</th>
<th>Market Name</th>
<th>Product</th>
<th>SA</th>
<th>Unit Price</th>
<th>Weight</th>
<th>Issued</th>
<th>Closing</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const channel = document.getElementById("channel");
const marketLabel = document.getElementById("marketLabel");
const marketName = document.getElementById("marketName");

function updateMarketField() {
  if (channel.value === "Market sales") {
    marketLabel.style.display = "block";
    marketName.style.display = "block";
  } else {
    marketLabel.style.display = "none";
    marketName.style.display = "none";
    marketName.value = "";
  }
}

channel.addEventListener("change", updateMarketField);

function recordData() {
  const date = document.getElementById("date").value;
  const district = document.getElementById("district").value;
  const product = document.getElementById("product").value;
  const sa = document.getElementById("sa").value;
  const price = document.getElementById("price").value;
  const weight = document.getElementById("weight").value;
  const issued = document.getElementById("issuedPortions").value;
  const closing = document.getElementById("closingPortions").value;

  if (!date || !district || !channel.value || !product || !sa) {
    alert("Please fill required fields.");
    return;
  }

  if (channel.value === "Market sales" && !marketName.value) {
    alert("Please select Market Name.");
    return;
  }

  if (parseFloat(closing) > parseFloat(issued)) {
    alert("Closing cannot exceed issued.");
    return;
  }

  const table = document.querySelector("#recordsTable tbody");
  const row = table.insertRow();

  row.insertCell().innerText = date;
  row.insertCell().innerText = district;
  row.insertCell().innerText = channel.value;
  row.insertCell().innerText = channel.value === "Market sales" ? marketName.value : "";
  row.insertCell().innerText = product;
  row.insertCell().innerText = sa;
  row.insertCell().innerText = price;
  row.insertCell().innerText = weight;
  row.insertCell().innerText = issued;
  row.insertCell().innerText = closing;

  const del = document.createElement("button");
  del.innerText = "Delete";
  del.onclick = () => row.remove();
  row.insertCell().appendChild(del);

  resetForm();
}

function resetForm() {
  document.getElementById("date").value = "";
  document.getElementById("district").value = "";
  document.getElementById("product").value = "";
  document.getElementById("sa").value = "";
  document.getElementById("price").value = "";
  document.getElementById("weight").value = "";
  document.getElementById("issuedPortions").value = "";
  document.getElementById("closingPortions").value = "";
  marketName.value = "";
  updateMarketField();
}

updateMarketField();
</script>

</body>
</html>
